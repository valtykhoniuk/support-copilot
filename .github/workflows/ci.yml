name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (optional)
        run: pip install ruff && ruff check app/ ingest.py evals/ redteam/ || true

      - name: Ingest knowledge base
        run: python ingest.py

      - name: Run evals (eval gate)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python evals/run_evals.py

      - name: DeepEval faithfulness (5-case subset)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pip install deepeval pytest && pytest evals/test_deepeval.py -q

      - name: Red team — manual attacks (gate ≥5/6)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python redteam/manual_attacks.py

      - name: Red team — CSV attack library
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python redteam/run_csv_attacks.py

      - name: Agent eval gate
        run: python evals/agent_evals.py
